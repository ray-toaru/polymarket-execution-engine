name: ci

on:
  workflow_dispatch:
  workflow_call:
  push:
    paths:
      - ".github/**"
      - ".gitignore"
      - ".env.example"
      - ".env.profiles.example"
      - "adapters/**"
      - "config/**"
      - "crates/**"
      - "docs/**"
      - "migrations/**"
      - "openapi/**"
      - "release/**"
      - "scripts/**"
      - "validation/**"
      - "AGENTS.md"
      - "Cargo.lock"
      - "Cargo.toml"
      - "README.md"
      - "rust-toolchain.toml"
  pull_request:
    paths:
      - ".github/**"
      - ".gitignore"
      - ".env.example"
      - ".env.profiles.example"
      - "adapters/**"
      - "config/**"
      - "crates/**"
      - "docs/**"
      - "migrations/**"
      - "openapi/**"
      - "release/**"
      - "scripts/**"
      - "validation/**"
      - "AGENTS.md"
      - "Cargo.lock"
      - "Cargo.toml"
      - "README.md"
      - "rust-toolchain.toml"

permissions:
  contents: read

jobs:
  current-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PMX_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Install Rust 1.96
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run current gates
        run: ./validation/run_current_gates.sh
