name: credentialed-sdk

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PMX_RUN_AUTHENTICATED_NON_TRADING_SMOKE: "1"
  PMX_RUN_SIGN_ONLY_DRY_RUN: "1"
  PMX_ALLOW_SIGN_ONLY_DRY_RUN: "1"

jobs:
  credentialed-non-trading:
    name: credentialed non-trading SDK gate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: credentialed-sdk
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Install Rust 1.96
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Refuse live side-effect gates
        run: |
          test "${PMX_ALLOW_LIVE_SUBMIT:-0}" != "1"
          test "${PMX_ALLOW_LIVE_CANCEL:-0}" != "1"
          test "${PMX_REAL_FUNDS_CANARY_ARMED:-0}" != "1"

      - name: Run authenticated non-trading SDK smoke
        env:
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLYMARKET_PRIVATE_KEY }}
          POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
          POLY_API_SECRET: ${{ secrets.POLY_API_SECRET }}
          POLY_API_PASSPHRASE: ${{ secrets.POLY_API_PASSPHRASE }}
        run: cargo test --manifest-path adapters/pmx-official-sdk-adapter/Cargo.toml --features authenticated-smoke --locked authenticated_non_trading_smoke -- --nocapture --test-threads=1

      - name: Run sign-only dry-run SDK gate
        env:
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLYMARKET_PRIVATE_KEY }}
          POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
          POLY_API_SECRET: ${{ secrets.POLY_API_SECRET }}
          POLY_API_PASSPHRASE: ${{ secrets.POLY_API_PASSPHRASE }}
        run: cargo test --manifest-path adapters/pmx-official-sdk-adapter/Cargo.toml --features sign-only-dry-run --locked sign_only_dry_run -- --nocapture --test-threads=1
